<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房地合一重購退稅與風險指數檢核系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .timeline-line { position: absolute; left: 15px; top: 0; bottom: 0; width: 2px; background-color: #e5e7eb; z-index: 0; }
        .timeline-dot { position: relative; z-index: 1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // 民國年下拉選單元件
        const ROCDateInput = ({ value, onChange, label }) => {
            const [y, setY] = useState('');
            const [m, setM] = useState('');
            const [d, setD] = useState('');

            useEffect(() => {
                if (value) {
                    const parsed = new Date(value);
                    if (!isNaN(parsed)) {
                        setY(parsed.getFullYear() - 1911);
                        setM(parsed.getMonth() + 1);
                        setD(parsed.getDate());
                    }
                } else {
                    setY(''); setM(''); setD('');
                }
            }, [value]);

            const handleChange = (newY, newM, newD) => {
                setY(newY); setM(newM); setD(newD);
                if (newY && newM && newD) {
                    const fullYear = parseInt(newY) + 1911;
                    const monthStr = String(newM).padStart(2, '0');
                    const dayStr = String(newD).padStart(2, '0');
                    onChange(fullYear + "-" + monthStr + "-" + dayStr);
                } else {
                    onChange('');
                }
            };

            const years = Array.from({length: 80}, (_, i) => 125 - i);
            const months = Array.from({length: 12}, (_, i) => i + 1);
            const daysInMonth = (y && m) ? new Date(parseInt(y) + 1911, parseInt(m), 0).getDate() : 31;
            const days = Array.from({length: daysInMonth}, (_, i) => i + 1);

            return (
                <div className="flex flex-col mb-2">
                    <label className="text-sm font-medium text-gray-700 mb-1">{label}</label>
                    <div className="flex gap-2">
                        <select value={y} onChange={e => handleChange(e.target.value, m, d)} className="flex-1 rounded border-gray-300 p-2 border bg-white text-sm shadow-sm">
                            <option value="">民國年</option>
                            {years.map(year => <option key={year} value={year}>{year}</option>)}
                        </select>
                        <select value={m} onChange={e => handleChange(y, e.target.value, d)} className="flex-1 rounded border-gray-300 p-2 border bg-white text-sm shadow-sm">
                            <option value="">月</option>
                            {months.map(month => <option key={month} value={month}>{month}</option>)}
                        </select>
                        <select value={d} onChange={e => handleChange(y, m, e.target.value)} className="flex-1 rounded border-gray-300 p-2 border bg-white text-sm shadow-sm">
                            <option value="">日</option>
                            {days.map(day => <option key={day} value={day}>{day}</option>)}
                        </select>
                    </div>
                </div>
            );
        };

        const App = () => {
            // 基礎日期與產權狀態
            const [oldAcquireDate, setOldAcquireDate] = useState('');
            const [oldRegDate, setOldRegDate] = useState('');
            const [oldSaleDate, setOldSaleDate] = useState('');
            const [newAcquireDate, setNewAcquireDate] = useState('');
            const [newRegDate, setNewRegDate] = useState('');
            const [isSameOwner, setIsSameOwner] = useState('yes');

            // 設籍身分勾選
            const [oldRegSelf, setOldRegSelf] = useState(true);
            const [oldRegSpouse, setOldRegSpouse] = useState(false);
            const [oldRegMinor, setOldRegMinor] = useState(false);

            const [newRegSelf, setNewRegSelf] = useState(true);
            const [newRegSpouse, setNewRegSpouse] = useState(false);
            const [newRegMinor, setNewRegMinor] = useState(false);

            // 法定條件狀態
            const [noRentBiz1Year, setNoRentBiz1Year] = useState('yes');
            const [newNoRentBiz, setNewNoRentBiz] = useState('yes');
            const [post5YearViolation, setPost5YearViolation] = useState('no');
            const [post5YearException, setPost5YearException] = useState('na');

            // 風險評估狀態
            const [waterElectricNormal, setWaterElectricNormal] = useState('yes');
            const [statusDocNoResidence, setStatusDocNoResidence] = useState('no');
            const [regCloseToSale, setRegCloseToSale] = useState('no');
            const [addressMatch, setAddressMatch] = useState('yes');
            const [otherNonCompliance, setOtherNonCompliance] = useState('no');

            const calculateDays = (d1, d2) => {
                if (!d1 || !d2) return null;
                const diffTime = Math.abs(new Date(d2) - new Date(d1));
                return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            };

            const calculateYears = (d1, d2) => {
                const days = calculateDays(d1, d2);
                return days ? (days / 365.25).toFixed(2) : null;
            };

            const formatROC = (d) => {
                if (!d) return '';
                const date = new Date(d);
                return "民國 " + (date.getFullYear() - 1911) + " 年 " + (date.getMonth() + 1) + " 月 " + date.getDate() + " 日";
            };

            // 判定先購後售 或 先售後購
            const buySellType = useMemo(() => {
                if (!oldSaleDate || !newAcquireDate) return '';
                const oldD = new Date(oldSaleDate);
                const newD = new Date(newAcquireDate);
                if (newD < oldD) return '本案為先購後售';
                if (newD > oldD) return '本案為先售後購';
                return '本案為同日購售';
            }, [oldSaleDate, newAcquireDate]);

            // 檢核與風險邏輯
            const evaluation = useMemo(() => {
                let refund = { pass: false, reasons: [] };
                let risk = { score: 0, level: '低風險', color: 'bg-green-100 border-green-500 text-green-800', details: [] };

                // 1. 法定要件檢核
                if (!oldSaleDate || !newAcquireDate) {
                    refund.reasons.push("請完整填寫舊屋出售與新屋重購日期以計算間距。");
                } else {
                    const gapYears = calculateYears(oldSaleDate, newAcquireDate);
                    if (gapYears > 2) refund.reasons.push("新舊屋移轉間隔超過 2 年。");
                    if (isSameOwner === 'no') refund.reasons.push("所有權人非本人或配偶。");
                    
                    if (!oldRegDate) refund.reasons.push("舊屋尚未辦竣戶籍登記。");
                    else if (!oldRegSelf && !oldRegSpouse && !oldRegMinor) refund.reasons.push("舊屋設籍須勾選本人、配偶或未成年子女。");
                    
                    if (!newRegDate) refund.reasons.push("新屋尚未辦竣戶籍登記。");
                    else if (!newRegSelf && !newRegSpouse && !newRegMinor) refund.reasons.push("新屋設籍須勾選本人、配偶或未成年子女。");

                    if (noRentBiz1Year === 'no') refund.reasons.push("舊屋出售前 1 年內曾出租或供營業使用。");
                    if (newNoRentBiz === 'no') refund.reasons.push("新屋購入後曾出租或供營業使用。");
                    if (post5YearViolation === 'yes' && post5YearException !== 'yes') refund.reasons.push("重購 5 年內有遷出戶籍或改作他用之情形，且不符例外規定，將被追繳。");
                    
                    if (refund.reasons.length === 0) refund.pass = true;
                }

                // 2. 實質居住風險評估
                if (waterElectricNormal === 'no') {
                    risk.score += 30;
                    risk.details.push("【高致命傷】水電度數過低或為零：國稅局查核「實際居住」之首要客觀標準。");
                }
                if (statusDocNoResidence === 'yes') {
                    risk.score += 25;
                    risk.details.push("【書面破綻】現況說明書勾選無居住：買賣契約附件註明無居住，常成否准之直接證據。");
                }
                if (regCloseToSale === 'yes') {
                    risk.score += 20;
                    risk.details.push("【形式安排】戶籍遷入與出售日過近：臨售前才遷入，極易被認定為僅符合形式要件之避稅安排。");
                }
                if (addressMatch === 'no') {
                    risk.score += 15;
                    risk.details.push("【生活重心】通訊/就醫地址不符：日常收件與就醫紀錄若在他處，會被輔助認定該房地非生活重心。");
                }
                if (otherNonCompliance === 'yes') {
                    risk.score += 10;
                    risk.details.push("【綜合事實】其他未符合實質居住要件：遭查獲無出入紀錄或其他客觀不符居住之事實。");
                }

                if (risk.score >= 50) {
                    risk.level = '高風險 (極易遭剔除)';
                    risk.color = 'bg-red-100 border-red-500 text-red-900';
                } else if (risk.score >= 25) {
                    risk.level = '中風險 (易遭調閱說明)';
                    risk.color = 'bg-yellow-100 border-yellow-500 text-yellow-900';
                } else if (risk.score > 0) {
                    risk.level = '低風險 (仍須留意細節)';
                    risk.color = 'bg-blue-100 border-blue-500 text-blue-900';
                }

                if (!refund.pass) {
                    risk.level = '法定要件未符';
                    risk.color = 'bg-gray-100 border-gray-400 text-gray-500';
                }

                return { refund, risk };
            }, [oldSaleDate, newAcquireDate, oldRegDate, newRegDate, isSameOwner, noRentBiz1Year, newNoRentBiz, post5YearViolation, post5YearException, waterElectricNormal, statusDocNoResidence, regCloseToSale, addressMatch, otherNonCompliance, oldRegSelf, oldRegSpouse, oldRegMinor, newRegSelf, newRegSpouse, newRegMinor]);

            // 時間軸數據
            const timelineEvents = useMemo(() => {
                const events = [];
                if (oldAcquireDate) events.push({ date: new Date(oldAcquireDate), label: '舊屋取得', color: 'bg-blue-500' });
                if (oldRegDate) events.push({ date: new Date(oldRegDate), label: '舊屋設籍', color: 'bg-purple-500' });
                if (oldSaleDate) events.push({ date: new Date(oldSaleDate), label: '舊屋出售', color: 'bg-red-500' });
                if (newAcquireDate) events.push({ date: new Date(newAcquireDate), label: '新屋重購', color: 'bg-green-500' });
                if (newRegDate) events.push({ date: new Date(newRegDate), label: '新屋設籍', color: 'bg-teal-400' });
                return events.sort((a, b) => a.date - b.date).map(e => ({ ...e, dateStr: formatROC(e.date) }));
            }, [oldAcquireDate, oldRegDate, oldSaleDate, newAcquireDate, newRegDate]);

            // 甘特圖運算
            const ganttData = useMemo(() => {
                if (!oldAcquireDate || !oldSaleDate || !newAcquireDate || !oldRegDate) return { valid: false };

                const dAcq = new Date(oldAcquireDate).getTime();
                const dSale = new Date(oldSaleDate).getTime();
                const dNewAcq = new Date(newAcquireDate).getTime();
                const dReg = new Date(oldRegDate).getTime();

                const twoYearsMs = 2 * 365.25 * 24 * 60 * 60 * 1000;
                const dWindowStart = dSale - twoYearsMs;
                const dWindowEnd = dSale + twoYearsMs;

                const minTime = Math.min(dAcq, dSale, dNewAcq, dReg, dWindowStart);
                const maxTime = Math.max(dAcq, dSale, dNewAcq, dReg, dWindowEnd);
                const totalDuration = maxTime - minTime || 1;

                const getStyle = (start, end) => {
                    const s = Math.max(start, minTime);
                    const e = Math.min(end, maxTime);
                    const left = ((s - minTime) / totalDuration) * 100;
                    let width = ((e - s) / totalDuration) * 100;
                    return { left: `${left}%`, width: `${Math.max(width, 0.5)}%` };
                };

                const getPointStyle = (time) => {
                    const left = ((time - minTime) / totalDuration) * 100;
                    return { left: `${left}%` };
                }

                return {
                    valid: true,
                    oldHold: getStyle(dAcq, dSale),
                    regHold: getStyle(dReg, dSale),
                    window: getStyle(dWindowStart, dWindowEnd),
                    newAcqPoint: getPointStyle(dNewAcq),
                    salePoint: getPointStyle(dSale),
                    isNewAcqInWindow: dNewAcq >= dWindowStart && dNewAcq <= dWindowEnd
                };
            }, [oldAcquireDate, oldRegDate, oldSaleDate, newAcquireDate]);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    {/* Header */}
                    <div className="max-w-6xl mx-auto bg-white rounded-xl shadow-md p-6 border-t-4 border-indigo-600 mb-6">
                        <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                            <svg className="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                            房地合一重購退稅與實質風險檢核系統
                        </h1>
                    </div>

                    <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
                        {/* Left Column: Form (Span 7) */}
                        <div className="lg:col-span-7 space-y-6">
                            
                            {/* Section 1: 法定客觀條件 */}
                            <section className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                <h2 className="text-lg font-bold text-indigo-800 border-b border-indigo-100 pb-2 mb-4">一、法定時效與產權條件</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="bg-red-50 p-3 rounded flex flex-col gap-3">
                                        <ROCDateInput label="舊屋取得日期" value={oldAcquireDate} onChange={setOldAcquireDate} />
                                        <ROCDateInput label="舊屋辦竣設籍日期" value={oldRegDate} onChange={setOldRegDate} />
                                        <div>
                                            <span className="text-xs font-semibold text-red-800 block mb-1">舊屋設籍對象：</span>
                                            <div className="flex gap-2 text-xs text-red-800">
                                                <label className="flex items-center"><input type="checkbox" checked={oldRegSelf} onChange={e=>setOldRegSelf(e.target.checked)} className="mr-1"/>本人</label>
                                                <label className="flex items-center"><input type="checkbox" checked={oldRegSpouse} onChange={e=>setOldRegSpouse(e.target.checked)} className="mr-1"/>配偶</label>
                                                <label className="flex items-center"><input type="checkbox" checked={oldRegMinor} onChange={e=>setOldRegMinor(e.target.checked)} className="mr-1"/>未成年子女</label>
                                            </div>
                                        </div>
                                        <ROCDateInput label="舊屋出售(移轉)日期" value={oldSaleDate} onChange={setOldSaleDate} />
                                    </div>
                                    <div className="bg-green-50 p-3 rounded flex flex-col gap-3">
                                        <ROCDateInput label="新屋重購(取得)日期" value={newAcquireDate} onChange={setNewAcquireDate} />
                                        <ROCDateInput label="新屋辦竣設籍日期" value={newRegDate} onChange={setNewRegDate} />
                                        <div>
                                            <span className="text-xs font-semibold text-green-800 block mb-1">新屋設籍對象：</span>
                                            <div className="flex gap-2 text-xs text-green-800">
                                                <label className="flex items-center"><input type="checkbox" checked={newRegSelf} onChange={e=>setNewRegSelf(e.target.checked)} className="mr-1"/>本人</label>
                                                <label className="flex items-center"><input type="checkbox" checked={newRegSpouse} onChange={e=>setNewRegSpouse(e.target.checked)} className="mr-1"/>配偶</label>
                                                <label className="flex items-center"><input type="checkbox" checked={newRegMinor} onChange={e=>setNewRegMinor(e.target.checked)} className="mr-1"/>未成年子女</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-4 space-y-3 text-sm">
                                    <label className="flex flex-col">
                                        <span className="font-semibold text-gray-700">新舊屋所有權人是否為本人或配偶？</span>
                                        <select value={isSameOwner} onChange={e => setIsSameOwner(e.target.value)} className="mt-1 rounded border-gray-300 p-2 border">
                                            <option value="yes">是 (符合規定)</option><option value="no">否 (不符規定)</option>
                                        </select>
                                    </label>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <label className="flex flex-col">
                                            <span className="font-semibold text-gray-700">舊屋出售前1年內無出租/營業？</span>
                                            <select value={noRentBiz1Year} onChange={e => setNoRentBiz1Year(e.target.value)} className="mt-1 rounded border-gray-300 p-2 border">
                                                <option value="yes">是 (無出租營業)</option><option value="no">否</option>
                                            </select>
                                        </label>
                                        <label className="flex flex-col">
                                            <span className="font-semibold text-gray-700">新屋購入後無出租/營業？</span>
                                            <select value={newNoRentBiz} onChange={e => setNewNoRentBiz(e.target.value)} className="mt-1 rounded border-gray-300 p-2 border">
                                                <option value="yes">是 (無出租營業)</option><option value="no">否</option>
                                            </select>
                                        </label>
                                    </div>
                                    <div className="mt-4 p-3 bg-gray-50 border rounded">
                                        <label className="flex flex-col">
                                            <span className="font-semibold text-red-600">重購新屋 5 年內，是否有遷出戶籍或改作他用？</span>
                                            <select value={post5YearViolation} onChange={e => setPost5YearViolation(e.target.value)} className="mt-1 rounded border-gray-300 p-2 border">
                                                <option value="no">否 (皆正常設籍自住)</option><option value="yes">是 (有遷出或供營業等)</option>
                                            </select>
                                        </label>
                                        {post5YearViolation === 'yes' && (
                                            <label className="flex flex-col mt-2">
                                                <span className="font-semibold text-yellow-700">承上，是否符合「未成年子女就學學區要求、公務派駐國外、原所有權人死亡」等例外，且實際仍自住？</span>
                                                <select value={post5YearException} onChange={e => setPost5YearException(e.target.value)} className="mt-1 rounded border-gray-300 p-2 border">
                                                    <option value="na">請選擇</option><option value="yes">是 (符合免追繳例外)</option><option value="no">否 (不符合)</option>
                                                </select>
                                            </label>
                                        )}
                                    </div>
                                </div>
                            </section>

                            {/* Section 2: 實質居住風險評估 */}
                            <section className="bg-white rounded-xl shadow-sm border border-red-200 p-6 relative overflow-hidden">
                                <div className="absolute top-0 right-0 bg-red-500 text-white text-xs px-3 py-1 font-bold rounded-bl-lg">國稅局查核雷達</div>
                                <h2 className="text-lg font-bold text-red-800 border-b border-red-100 pb-2 mb-4">二、實質居住事實風險評估</h2>
                                <p className="text-xs text-gray-500 mb-4">依據近期財政部訴願決定書整理之常見敗訴原因，請據實作答以評估風險：</p>
                                
                                <div className="space-y-4 text-sm">
                                    <div className="flex flex-col md:flex-row md:items-center justify-between bg-gray-50 p-3 rounded border">
                                        <span className="font-semibold text-gray-700 mb-2 md:mb-0">1. 持有期間之「水、電、瓦斯」使用度數是否正常？</span>
                                        <select value={waterElectricNormal} onChange={e => setWaterElectricNormal(e.target.value)} className="rounded border-gray-300 p-1 border md:w-36">
                                            <option value="yes">是 (度數正常)</option><option value="no">否 (極低或零)</option>
                                        </select>
                                    </div>
                                    <div className="flex flex-col md:flex-row md:items-center justify-between bg-gray-50 p-3 rounded border">
                                        <span className="font-semibold text-gray-700 mb-2 md:mb-0">2. 委託仲介銷售時，「標的物現況說明書」是否勾選「無居住」？</span>
                                        <select value={statusDocNoResidence} onChange={e => setStatusDocNoResidence(e.target.value)} className="rounded border-gray-300 p-1 border md:w-36">
                                            <option value="no">否 (勾選有居住)</option><option value="yes">是 (勾選無居住)</option>
                                        </select>
                                    </div>
                                    <div className="flex flex-col md:flex-row md:items-center justify-between bg-gray-50 p-3 rounded border">
                                        <span className="font-semibold text-gray-700 mb-2 md:mb-0">3. 戶籍遷入時間，是否與委託仲介出售或簽約日「非常相近」？</span>
                                        <select value={regCloseToSale} onChange={e => setRegCloseToSale(e.target.value)} className="rounded border-gray-300 p-1 border md:w-36">
                                            <option value="no">否 (早就遷入)</option><option value="yes">是 (臨售才遷)</option>
                                        </select>
                                    </div>
                                    <div className="flex flex-col md:flex-row md:items-center justify-between bg-gray-50 p-3 rounded border">
                                        <span className="font-semibold text-gray-700 mb-2 md:mb-0">4. 該期間個人之就醫紀錄、帳單通訊地等，是否與該房地相符？</span>
                                        <select value={addressMatch} onChange={e => setAddressMatch(e.target.value)} className="rounded border-gray-300 p-1 border md:w-36">
                                            <option value="yes">是 (相符)</option><option value="no">否 (在其他處)</option>
                                        </select>
                                    </div>
                                    <div className="flex flex-col md:flex-row md:items-center justify-between bg-gray-50 p-3 rounded border">
                                        <span className="font-semibold text-gray-700 mb-2 md:mb-0">5. 其他未符合實質居住要件（如：無出入紀錄、鄰居無印象等）？</span>
                                        <select value={otherNonCompliance} onChange={e => setOtherNonCompliance(e.target.value)} className="rounded border-gray-300 p-1 border md:w-36">
                                            <option value="no">否 (無疑慮)</option><option value="yes">是 (有其他未符)</option>
                                        </select>
                                    </div>
                                </div>
                            </section>

                        </div>

                        {/* Right Column: Results (Span 5) */}
                        <div className="lg:col-span-5 space-y-6">
                            
                            {/* Result 1: 法定要件 */}
                            <div className="bg-white rounded-xl shadow-md p-6">
                                <h2 className="text-lg font-bold text-gray-800 mb-4">第一關：法定要件檢核</h2>
                                <div className={"p-4 rounded-lg border-l-4 " + (evaluation.refund.pass ? 'bg-green-50 border-green-500' : 'bg-gray-100 border-gray-400')}>
                                    <h3 className={"font-bold flex items-center " + (evaluation.refund.pass ? 'text-green-700' : 'text-gray-700')}>
                                        {evaluation.refund.pass ? '✓ 法定資格符合' : '✗ 尚不符法定要件'}
                                    </h3>
                                    {!evaluation.refund.pass && evaluation.refund.reasons.length > 0 && (
                                        <ul className="mt-2 text-xs text-gray-600 list-disc list-inside">
                                            {evaluation.refund.reasons.map((r, i) => <li key={i}>{r}</li>)}
                                        </ul>
                                    )}
                                </div>
                            </div>

                            {/* Result 2: 風險指數 */}
                            <div className="bg-white rounded-xl shadow-md p-6">
                                <h2 className="text-lg font-bold text-gray-800 mb-4">第二關：實質居住風險指數</h2>
                                
                                <div className={"p-5 rounded-xl border-2 text-center mb-4 " + evaluation.risk.color}>
                                    <p className="text-sm font-bold opacity-80 mb-1">查核遭補稅風險</p>
                                    <p className="text-3xl font-black">{evaluation.risk.level}</p>
                                </div>

                                {evaluation.refund.pass && evaluation.risk.details.length > 0 && (
                                    <div className="mt-4 space-y-2">
                                        <p className="text-sm font-bold text-gray-700">⚠️ 風險地雷解析：</p>
                                        {evaluation.risk.details.map((detail, idx) => (
                                            <div key={idx} className="text-xs bg-red-50 text-red-700 p-2 rounded border border-red-100">
                                                {detail}
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {evaluation.refund.pass && evaluation.risk.score === 0 && (
                                    <div className="text-xs bg-blue-50 text-blue-700 p-3 rounded border border-blue-100">
                                        太棒了！您的狀況符合客觀居住事實，目前看來並無明顯踩到國稅局查核紅線，請妥善保留相關水電及生活單據以備查驗。
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Bottom Row: Timeline & Gantt Side by Side */}
                        <div className="lg:col-span-12 grid grid-cols-1 md:grid-cols-2 gap-6 mt-2">
                            {/* Timeline */}
                            <div className="bg-white rounded-xl shadow-md p-6">
                                <h3 className="font-bold text-gray-800 mb-2">產權與設籍時間軸</h3>
                                {buySellType && <div className="mb-4"><span className="inline-block bg-indigo-100 text-indigo-800 text-xs px-2 py-1 rounded font-bold">{buySellType}</span></div>}
                                {timelineEvents.length === 0 ? (
                                    <p className="text-sm text-gray-500 text-center py-4">請於上方輸入日期以產生時間軸</p>
                                ) : (
                                    <div className="relative pl-4 py-2">
                                        <div className="timeline-line"></div>
                                        <div className="space-y-6">
                                            {timelineEvents.map((evt, idx) => (
                                                <div key={idx} className="relative flex items-start">
                                                    <div className={"timeline-dot w-4 h-4 rounded-full mt-1 -ml-[19px] ring-4 ring-white " + evt.color}></div>
                                                    <div className="ml-4">
                                                        <div className="text-xs font-bold text-gray-500">{evt.dateStr}</div>
                                                        <div className="text-sm font-medium text-gray-800">{evt.label}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Gantt Chart Section */}
                            <div className="bg-white rounded-xl shadow-md p-6">
                                <h3 className="font-bold text-gray-800 mb-4 flex items-center">
                                    <svg className="w-5 h-5 mr-2 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                                    甘特圖呈現
                                </h3>
                                {(!ganttData || !ganttData.valid) ? (
                                    <p className="text-sm text-gray-500 text-center py-4">請完整輸入左側4項關鍵日期以產生圖表</p>
                                ) : (
                                    <div className="space-y-6">
                                        {/* A. 舊屋持有期間 */}
                                        <div>
                                            <div className="text-xs text-gray-700 mb-1 flex justify-between font-semibold">
                                                <span>A. 舊屋持有期間</span>
                                                <span>{calculateYears(oldAcquireDate, oldSaleDate)} 年</span>
                                            </div>
                                            <div className="w-full bg-gray-100 h-4 rounded overflow-hidden relative shadow-inner">
                                                <div className="absolute top-0 h-full bg-blue-500 rounded opacity-80" style={ganttData.oldHold}></div>
                                            </div>
                                        </div>

                                        {/* B. 重購是否落於售屋前後2年 */}
                                        <div>
                                            <div className="text-xs text-gray-700 mb-1 flex justify-between font-semibold">
                                                <span>B. 重購是否落於售屋前後 2 年</span>
                                                <span className={ganttData.isNewAcqInWindow ? "text-green-600" : "text-red-600"}>
                                                    {ganttData.isNewAcqInWindow ? '符合' : '不符'}
                                                </span>
                                            </div>
                                            <div className="w-full bg-gray-100 h-6 rounded relative shadow-inner">
                                                <div className="absolute top-1 h-4 bg-yellow-300 rounded opacity-50" style={ganttData.window}></div>
                                                <div className="absolute top-0 h-6 w-1 bg-red-500 z-10" style={ganttData.salePoint} title="售屋日"></div>
                                                <div className="absolute top-0 h-6 w-1 bg-green-500 z-20" style={ganttData.newAcqPoint} title="重購日"></div>
                                            </div>
                                            <div className="text-[10px] text-gray-400 mt-1 text-center">黃色區間: 法定2年 / 綠線: 新屋取得 / 紅線: 舊屋出售</div>
                                        </div>

                                        {/* C. 舊屋設籍期間 */}
                                        <div>
                                            <div className="text-xs text-gray-700 mb-1 flex justify-between font-semibold">
                                                <span>C. 舊屋設籍期間</span>
                                                <span>{calculateYears(oldRegDate, oldSaleDate)} 年</span>
                                            </div>
                                            <div className="w-full bg-gray-100 h-4 rounded overflow-hidden relative shadow-inner">
                                                <div className="absolute top-0 h-full bg-purple-500 rounded opacity-80" style={ganttData.regHold}></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
